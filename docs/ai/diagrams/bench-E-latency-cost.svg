<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif">
  <rect width="1100" height="540" fill="#F7F8FA"/>
  <text x="550" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#0F172A">Table E · Latency &amp; Cost Profile (per query)</text>
  <text x="550" y="70" text-anchor="middle" font-size="14" fill="#64748B">indicative · remote Gemini Flash endpoint · network-bound, so wall-clock varies with your connection</text>
  <rect x="320" y="86" width="460" height="28" rx="14" fill="#FEF3C7" stroke="#D97706" stroke-width="1.1"/>
  <text x="550" y="105" text-anchor="middle" font-size="11.5" fill="#92400E">Illustrative — live benchmark reports latency_s_mean per variant</text>

  <g font-size="14.5">
    <!-- header -->
    <rect x="50" y="132" width="1000" height="46" fill="#334155"/>
    <text x="70" y="161" font-size="14" font-weight="700" fill="#FFFFFF">Path</text>
    <text x="325" y="161" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Wall-clock</text>
    <text x="465" y="161" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">LLM calls</text>
    <text x="605" y="161" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Embed calls</text>
    <text x="695" y="161" font-size="14" font-weight="700" fill="#FFFFFF">Notes</text>

    <rect x="50" y="178" width="1000" height="42" fill="#FFFFFF"/>
    <text x="70" y="205" fill="#1E293B">BM25</text>
    <text x="325" y="205" text-anchor="middle" fill="#334155">~0.02 s</text>
    <text x="465" y="205" text-anchor="middle" fill="#334155">0</text>
    <text x="605" y="205" text-anchor="middle" fill="#334155">0</text>
    <text x="695" y="205" fill="#475569">rebuilt per query (small corpus)</text>

    <rect x="50" y="220" width="1000" height="42" fill="#F1F5F9"/>
    <text x="70" y="247" fill="#1E293B">Dense (warm cache)</text>
    <text x="325" y="247" text-anchor="middle" fill="#334155">~0.2 s</text>
    <text x="465" y="247" text-anchor="middle" fill="#334155">0</text>
    <text x="605" y="247" text-anchor="middle" fill="#334155">1 (query)</text>
    <text x="695" y="247" fill="#475569">unit vectors cached by content hash</text>

    <rect x="50" y="262" width="1000" height="42" fill="#FFFFFF"/>
    <text x="70" y="289" fill="#1E293B">Tree select</text>
    <text x="325" y="289" text-anchor="middle" fill="#334155">~0.9 s</text>
    <text x="465" y="289" text-anchor="middle" fill="#334155">1</text>
    <text x="605" y="289" text-anchor="middle" fill="#334155">0</text>
    <text x="695" y="289" fill="#475569">LLM reasons over the heading TOC</text>

    <rect x="50" y="304" width="1000" height="42" fill="#D1FAE5"/>
    <rect x="50" y="304" width="6" height="42" fill="#059669"/>
    <text x="70" y="331" font-weight="700" fill="#065F46">Hybrid (single-shot)</text>
    <text x="325" y="331" text-anchor="middle" font-weight="700" fill="#065F46">~1.3 s</text>
    <text x="465" y="331" text-anchor="middle" font-weight="700" fill="#065F46">1–2</text>
    <text x="605" y="331" text-anchor="middle" font-weight="700" fill="#065F46">1</text>
    <text x="695" y="331" fill="#065F46">tree + BM25 + dense + RRF</text>

    <rect x="50" y="346" width="1000" height="42" fill="#FFFFFF"/>
    <text x="70" y="373" fill="#1E293B">Agentic (3 rounds)</text>
    <text x="325" y="373" text-anchor="middle" fill="#334155">~3–5 s</text>
    <text x="465" y="373" text-anchor="middle" fill="#334155">3–6</text>
    <text x="605" y="373" text-anchor="middle" fill="#334155">1–3</text>
    <text x="695" y="373" fill="#475569">critique + follow-up sub-queries</text>

    <rect x="50" y="132" width="1000" height="256" fill="none" stroke="#94A3B8" stroke-width="1.4"/>
    <line x1="250" y1="132" x2="250" y2="388" stroke="#CBD5E1"/>
    <line x1="400" y1="132" x2="400" y2="388" stroke="#CBD5E1"/>
    <line x1="530" y1="132" x2="530" y2="388" stroke="#CBD5E1"/>
    <line x1="680" y1="132" x2="680" y2="388" stroke="#CBD5E1"/>
  </g>

  <rect x="50" y="414" width="1000" height="96" rx="10" fill="#F1F5F9" stroke="#64748B" stroke-width="1.3"/>
  <text x="70" y="439" font-size="14" font-weight="700" fill="#334155">Cost levers (if asked "how would you make it faster?")</text>
  <text x="70" y="463" font-size="13" fill="#475569">· per-unit caches (embeddings + KG triples) → only changed chunks re-computed   · early-exit when the critic says "sufficient"</text>
  <text x="70" y="485" font-size="13" fill="#475569">· disable the agentic loop for simple corpora   · a local Ollama endpoint removes network latency entirely (privacy bonus)</text>
</svg>
