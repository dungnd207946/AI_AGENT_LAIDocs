<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 800" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrT" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#0891B2"/>
    </marker>
  </defs>
  <rect width="1180" height="800" fill="#F7F8FA"/>
  <text x="590" y="42" text-anchor="middle" font-size="28" font-weight="700" fill="#0F172A">GraphRAG — Finding Split Evidence Vectors Miss</text>
  <text x="590" y="68" text-anchor="middle" font-size="15" fill="#64748B">the multi-hop problem: the answer is spread across sections with no shared keywords</text>

  <!-- problem statement -->
  <rect x="60" y="92" width="1060" height="64" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.4"/>
  <text x="84" y="116" font-size="14" font-weight="700" fill="#991B1B">Question: "Which city is connected to the company in the report?"</text>
  <text x="84" y="140" font-size="12.5" fill="#7F1D1D">"Paris" shares NO words with the question and lives in a different section than "Acme" → BM25 &amp; dense alone can miss it.</text>

  <!-- pipeline left column -->
  <text x="290" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A">Build (cached, incremental)</text>

  <rect x="80" y="204" width="420" height="60" rx="10" fill="#FFEDD5" stroke="#EA580C" stroke-width="1.4"/>
  <text x="290" y="226" text-anchor="middle" font-size="13" font-weight="700" fill="#9A3412">1 · Extract triples per unit (LLM)</text>
  <text x="290" y="247" text-anchor="middle" font-size="11.5" fill="#9A3412">(subject, relation, object) · cached in document_graph_units</text>
  <line x1="290" y1="264" x2="290" y2="286" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="80" y="288" width="420" height="56" rx="10" fill="#CFFAFE" stroke="#0891B2" stroke-width="1.4"/>
  <text x="290" y="310" text-anchor="middle" font-size="13" font-weight="700" fill="#155E75">2 · Build entity graph (deterministic, no LLM)</text>
  <text x="290" y="330" text-anchor="middle" font-size="11.5" fill="#155E75">normalize entities · unit_index maps entity → source units</text>
  <line x1="290" y1="344" x2="290" y2="366" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="80" y="368" width="420" height="56" rx="10" fill="#F3E8FF" stroke="#9333EA" stroke-width="1.4"/>
  <text x="290" y="390" text-anchor="middle" font-size="13" font-weight="700" fill="#6B21A8">3 · Extract question entities (1 LLM call)</text>
  <text x="290" y="410" text-anchor="middle" font-size="11.5" fill="#6B21A8">match to graph nodes → seeds = {Acme}</text>
  <line x1="290" y1="424" x2="290" y2="446" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="80" y="448" width="420" height="56" rx="10" fill="#D1FAE5" stroke="#059669" stroke-width="1.4"/>
  <text x="290" y="470" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">4 · BFS walk ≤ 2 hops → reached entities</text>
  <text x="290" y="490" text-anchor="middle" font-size="11.5" fill="#065F46">return their source units → ranked list into RRF</text>

  <!-- graph illustration right -->
  <text x="850" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A">The walk (2 hops)</text>
  <rect x="560" y="204" width="580" height="300" rx="12" fill="#FFFFFF" stroke="#475569" stroke-width="1.4"/>

  <!-- nodes -->
  <circle cx="660" cy="300" r="42" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="660" y="296" text-anchor="middle" font-size="14" font-weight="700" fill="#1D4ED8">Acme</text>
  <text x="660" y="314" text-anchor="middle" font-size="10" fill="#1E3A8A">seed · §1</text>

  <circle cx="850" cy="300" r="42" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="850" y="296" text-anchor="middle" font-size="14" font-weight="700" fill="#92400E">Jane</text>
  <text x="850" y="314" text-anchor="middle" font-size="10" fill="#92400E">§2</text>

  <circle cx="1040" cy="300" r="42" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
  <text x="1040" y="296" text-anchor="middle" font-size="14" font-weight="700" fill="#065F46">Paris</text>
  <text x="1040" y="314" text-anchor="middle" font-size="10" fill="#065F46">§4 · target</text>

  <!-- edges -->
  <line x1="702" y1="300" x2="804" y2="300" stroke="#0891B2" stroke-width="2.4" marker-end="url(#arrT)"/>
  <text x="753" y="290" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0E7490">founded by</text>
  <text x="753" y="324" text-anchor="middle" font-size="10" fill="#64748B">hop 1</text>

  <line x1="892" y1="300" x2="994" y2="300" stroke="#0891B2" stroke-width="2.4" marker-end="url(#arrT)"/>
  <text x="943" y="290" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0E7490">born in</text>
  <text x="943" y="324" text-anchor="middle" font-size="10" fill="#64748B">hop 2</text>

  <!-- units recovered -->
  <rect x="600" y="376" width="500" height="104" rx="10" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.3"/>
  <text x="850" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#155E75">Source units recovered by the walk</text>
  <text x="850" y="424" text-anchor="middle" font-size="12" fill="#155E75">§1 (Acme founded by Jane) · §2 (Jane) · §4 (Jane born in Paris)</text>
  <text x="850" y="448" text-anchor="middle" font-size="12" fill="#155E75">→ §4 is the "bridge unit" pure RAG drowned out</text>
  <text x="850" y="470" text-anchor="middle" font-size="11.5" font-style="italic" fill="#0E7490">these unit ids become one more ranked list fused into RRF</text>

  <!-- bottom notes -->
  <rect x="60" y="530" width="540" height="120" rx="12" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.3"/>
  <text x="330" y="554" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1D4ED8">Why caching is the whole point</text>
  <text x="78" y="578" font-size="12" fill="#1E3A8A">Without it, every question would re-extract the entire</text>
  <text x="78" y="597" font-size="12" fill="#1E3A8A">graph (1 LLM call PER unit) → too slow for live use.</text>
  <text x="78" y="619" font-size="12" fill="#1E3A8A">Triples cached per unit_hash + model → query time =</text>
  <text x="78" y="638" font-size="12" fill="#1E3A8A">1 entity-extraction call + a deterministic walk.</text>

  <rect x="620" y="530" width="500" height="120" rx="12" fill="#F1F5F9" stroke="#64748B" stroke-width="1.3"/>
  <text x="870" y="554" text-anchor="middle" font-size="13.5" font-weight="700" fill="#334155">Honest limit + two uses</text>
  <text x="638" y="578" font-size="12" fill="#475569">Quality ceiling = LLM triple-extraction quality;</text>
  <text x="638" y="597" font-size="12" fill="#475569">treated as a COMPLEMENT, never sole evidence.</text>
  <text x="638" y="619" font-size="12" fill="#475569">(a) graph_search → ranked units into RRF.</text>
  <text x="638" y="638" font-size="12" fill="#475569">(b) reason_over_graph → relation-chain scaffold.</text>

  <!-- graph of thought render -->
  <rect x="60" y="668" width="1060" height="108" rx="12" fill="#FAF5FF" stroke="#9333EA" stroke-width="1.5"/>
  <text x="84" y="692" font-size="14" font-weight="700" fill="#6B21A8">reason_over_graph (graph-of-thought) — renders the chain for the agent &amp; the UI ReasoningChain panel</text>
  <text x="84" y="722" font-size="14" font-family="Consolas, monospace" fill="#4C1D95">Acme  --[founded by]-->  Jane  --[born in]-->  Paris</text>
  <text x="84" y="752" font-size="12" fill="#6B21A8">"a map of where to look", not standalone evidence — the agent still grounds every claim in retrieved prose (retrieve_context).</text>
</svg>
