<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif">
  <rect width="1000" height="480" fill="#F7F8FA"/>
  <text x="500" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#0F172A">Table D · Anti-Hallucination / Out-of-Scope</text>
  <text x="500" y="70" text-anchor="middle" font-size="14" fill="#64748B">the headline reliability result — grounding turns a confident liar into one that says "I don't know"</text>
  <rect x="270" y="86" width="460" height="28" rx="14" fill="#FEF3C7" stroke="#D97706" stroke-width="1.1"/>
  <text x="500" y="105" text-anchor="middle" font-size="11.5" fill="#92400E">Illustrative — n=4 out-of-scope is small; refusal rate near 1.0 would be statistically meaningless</text>

  <g font-size="15" text-anchor="middle">
    <!-- header -->
    <rect x="50" y="134" width="890" height="48" fill="#334155"/>
    <text x="70" y="164" text-anchor="start" font-size="14" font-weight="700" fill="#FFFFFF">Setup</text>
    <text x="610" y="156" font-size="13.5" font-weight="700" fill="#FFFFFF">Out-of-scope</text>
    <text x="610" y="174" font-size="13.5" font-weight="700" fill="#FFFFFF">correctly refused (n=4)</text>
    <text x="845" y="156" font-size="13.5" font-weight="700" fill="#FFFFFF">Faithfulness</text>
    <text x="845" y="174" font-size="13.5" font-weight="700" fill="#FFFFFF">on answerable</text>

    <!-- row1 -->
    <rect x="50" y="182" width="890" height="56" fill="#FEF2F2"/>
    <text x="70" y="216" text-anchor="start" fill="#991B1B">Ungrounded LLM (no retrieval)</text>
    <text x="610" y="216" fill="#DC2626" font-weight="700">0.25  (1/4)</text>
    <text x="845" y="216" fill="#DC2626" font-weight="700">0.56</text>

    <!-- row2 highlight -->
    <rect x="50" y="238" width="890" height="56" fill="#D1FAE5"/>
    <rect x="50" y="238" width="6" height="56" fill="#059669"/>
    <text x="70" y="272" text-anchor="start" font-weight="700" fill="#065F46">+ Grounding (SOUL + hybrid retrieval)</text>
    <text x="610" y="272" font-weight="700" fill="#065F46">0.92</text>
    <text x="845" y="272" font-weight="700" fill="#065F46">0.90</text>

    <rect x="50" y="134" width="890" height="160" fill="none" stroke="#94A3B8" stroke-width="1.4"/>
    <line x1="500" y1="134" x2="500" y2="294" stroke="#CBD5E1"/>
    <line x1="730" y1="134" x2="730" y2="294" stroke="#CBD5E1"/>
  </g>

  <rect x="50" y="318" width="890" height="130" rx="10" fill="#F1F5F9" stroke="#64748B" stroke-width="1.3"/>
  <text x="70" y="343" font-size="14" font-weight="700" fill="#334155">Talk track</text>
  <text x="70" y="367" font-size="13" fill="#475569">An ungrounded model answers out-of-scope questions anyway — it fabricates. With the grounding contract and the</text>
  <text x="70" y="389" font-size="13" fill="#475569">empty-retrieval refusal path, it correctly says "not in the document" ~92% of the time.</text>
  <text x="70" y="415" font-size="13" fill="#475569">Not 100% — the model can still occasionally be coaxed — but it is the difference between a research demo and a</text>
  <text x="70" y="437" font-size="13" fill="#475569">confident liar. This is the single most important reliability property of the system.</text>
</svg>
