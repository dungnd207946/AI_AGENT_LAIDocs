<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif">
  <rect width="1000" height="560" fill="#F7F8FA"/>
  <text x="500" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#0F172A">Table A · Retrieval Variants — Deterministic Metrics</text>
  <text x="500" y="70" text-anchor="middle" font-size="14" fill="#64748B">k = 5 · n = 26 answerable questions · higher is better</text>
  <rect x="270" y="86" width="460" height="28" rx="14" fill="#FEF3C7" stroke="#D97706" stroke-width="1.1"/>
  <text x="500" y="105" text-anchor="middle" font-size="11.5" fill="#92400E">Illustrative — regenerate with run_retrieval_benchmark.py before citing as measured</text>

  <!-- table -->
  <g font-size="14.5" text-anchor="middle">
    <!-- header -->
    <rect x="50" y="130" width="890" height="44" fill="#334155"/>
    <text x="70" y="158" text-anchor="start" font-size="14" font-weight="700" fill="#FFFFFF">Variant</text>
    <text x="355" y="158" font-size="14" font-weight="700" fill="#FFFFFF">P@5</text>
    <text x="465" y="158" font-size="14" font-weight="700" fill="#FFFFFF">R@5</text>
    <text x="575" y="158" font-size="14" font-weight="700" fill="#FFFFFF">MRR</text>
    <text x="695" y="158" font-size="14" font-weight="700" fill="#FFFFFF">nDCG@5</text>
    <text x="850" y="158" font-size="14" font-weight="700" fill="#FFFFFF">Latency/q</text>

    <!-- row1 BM25 -->
    <rect x="50" y="174" width="890" height="42" fill="#FFFFFF"/>
    <text x="70" y="201" text-anchor="start" fill="#1E293B">BM25 (lexical)</text>
    <text x="355" y="201" fill="#334155">0.22</text>
    <text x="465" y="201" fill="#334155">0.63</text>
    <text x="575" y="201" fill="#334155">0.67</text>
    <text x="695" y="201" fill="#334155">0.60</text>
    <text x="850" y="201" fill="#334155">~0.02 s</text>

    <!-- row2 Dense -->
    <rect x="50" y="216" width="890" height="42" fill="#F1F5F9"/>
    <text x="70" y="243" text-anchor="start" fill="#1E293B">Dense (embeddings)</text>
    <text x="355" y="243" fill="#334155">0.26</text>
    <text x="465" y="243" fill="#334155">0.78</text>
    <text x="575" y="243" fill="#334155">0.79</text>
    <text x="695" y="243" fill="#334155">0.72</text>
    <text x="850" y="243" fill="#334155">~0.20 s</text>

    <!-- row3 Tree -->
    <rect x="50" y="258" width="890" height="42" fill="#FFFFFF"/>
    <text x="70" y="285" text-anchor="start" fill="#1E293B">Tree (LLM node-select)</text>
    <text x="355" y="285" fill="#334155">0.24</text>
    <text x="465" y="285" fill="#334155">0.68</text>
    <text x="575" y="285" fill="#334155">0.71</text>
    <text x="695" y="285" fill="#334155">0.65</text>
    <text x="850" y="285" fill="#334155">~0.9 s</text>

    <!-- row4 Graph -->
    <rect x="50" y="300" width="890" height="42" fill="#F1F5F9"/>
    <text x="70" y="327" text-anchor="start" fill="#1E293B">Graph (entity walk)</text>
    <text x="355" y="327" fill="#334155">0.27</text>
    <text x="465" y="327" fill="#334155">0.73</text>
    <text x="575" y="327" fill="#334155">0.75</text>
    <text x="695" y="327" fill="#334155">0.69</text>
    <text x="850" y="327" fill="#334155">~1.1 s</text>

    <!-- row5 Hybrid (highlight) -->
    <rect x="50" y="342" width="890" height="42" fill="#D1FAE5"/>
    <rect x="50" y="342" width="6" height="42" fill="#059669"/>
    <text x="70" y="369" text-anchor="start" font-weight="700" fill="#065F46">Hybrid (RRF)</text>
    <text x="355" y="369" font-weight="700" fill="#065F46">0.29</text>
    <text x="465" y="369" font-weight="700" fill="#065F46">0.85</text>
    <text x="575" y="369" font-weight="700" fill="#065F46">0.83</text>
    <text x="695" y="369" font-weight="700" fill="#065F46">0.78</text>
    <text x="850" y="369" font-weight="700" fill="#065F46">~1.3 s</text>

    <!-- row6 Hybrid+rerank -->
    <rect x="50" y="384" width="890" height="42" fill="#FFFFFF"/>
    <text x="70" y="411" text-anchor="start" fill="#1E293B">Hybrid + rerank</text>
    <text x="355" y="411" fill="#334155">0.31</text>
    <text x="465" y="411" fill="#334155">0.87</text>
    <text x="575" y="411" fill="#334155">0.86</text>
    <text x="695" y="411" fill="#334155">0.81</text>
    <text x="850" y="411" fill="#334155">~1.6 s</text>

    <!-- borders -->
    <rect x="50" y="130" width="890" height="296" fill="none" stroke="#94A3B8" stroke-width="1.4"/>
    <line x1="300" y1="130" x2="300" y2="426" stroke="#CBD5E1"/>
    <line x1="410" y1="130" x2="410" y2="426" stroke="#CBD5E1"/>
    <line x1="520" y1="130" x2="520" y2="426" stroke="#CBD5E1"/>
    <line x1="630" y1="130" x2="630" y2="426" stroke="#CBD5E1"/>
    <line x1="760" y1="130" x2="760" y2="426" stroke="#CBD5E1"/>
  </g>

  <text x="50" y="458" font-size="13" fill="#475569" font-weight="700">Read it:</text>
  <text x="118" y="458" font-size="13" fill="#64748B">Hybrid beats every single component on recall — RRF rewards units multiple retrievers agree on.</text>
  <text x="50" y="480" font-size="13" fill="#64748B">Rerank adds only ~+2 pts (honest: cross-encoders help most when the shortlist is already good). P@5 is low because ~1.6 gold units/Q.</text>
  <text x="50" y="510" font-size="12.5" fill="#94A3B8">Anchor: open-domain BEIR dense/hybrid retrievers score nDCG@10 ≈ 0.45–0.60. This is an easier single-domain set — not a SOTA claim.</text>
</svg>
