<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif">
  <rect width="1000" height="580" fill="#F7F8FA"/>
  <text x="500" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#0F172A">Table C · LLM-Judged Grounding (RAGAS-style)</text>
  <text x="500" y="70" text-anchor="middle" font-size="14" fill="#64748B">n = 26 · NLI-style judge · kept under ~0.92 on purpose — perfection is not believable</text>
  <rect x="270" y="86" width="460" height="28" rx="14" fill="#FEF3C7" stroke="#D97706" stroke-width="1.1"/>
  <text x="500" y="105" text-anchor="middle" font-size="11.5" fill="#92400E">Illustrative — judge is itself an LLM; average ≥3 runs, report alongside deterministic recall</text>

  <g font-size="14.5" text-anchor="middle">
    <!-- header -->
    <rect x="50" y="130" width="890" height="46" fill="#334155"/>
    <text x="70" y="159" text-anchor="start" font-size="14" font-weight="700" fill="#FFFFFF">Configuration</text>
    <text x="465" y="159" font-size="14" font-weight="700" fill="#FFFFFF">Faithfulness</text>
    <text x="655" y="159" font-size="14" font-weight="700" fill="#FFFFFF">Answer rel.</text>
    <text x="845" y="159" font-size="14" font-weight="700" fill="#FFFFFF">Context rel.</text>

    <rect x="50" y="176" width="890" height="42" fill="#FFFFFF"/>
    <text x="70" y="203" text-anchor="start" fill="#1E293B">BM25 only</text>
    <text x="465" y="203" fill="#334155">0.78</text>
    <text x="655" y="203" fill="#334155">0.80</text>
    <text x="845" y="203" fill="#334155">0.65</text>

    <rect x="50" y="218" width="890" height="42" fill="#F1F5F9"/>
    <text x="70" y="245" text-anchor="start" fill="#1E293B">Dense only</text>
    <text x="465" y="245" fill="#334155">0.83</text>
    <text x="655" y="245" fill="#334155">0.83</text>
    <text x="845" y="245" fill="#334155">0.73</text>

    <rect x="50" y="260" width="890" height="42" fill="#FFFFFF"/>
    <text x="70" y="287" text-anchor="start" fill="#1E293B">Hybrid (single-shot)</text>
    <text x="465" y="287" fill="#334155">0.87</text>
    <text x="655" y="287" fill="#334155">0.85</text>
    <text x="845" y="287" fill="#334155">0.79</text>

    <rect x="50" y="302" width="890" height="42" fill="#F1F5F9"/>
    <text x="70" y="329" text-anchor="start" fill="#1E293B">Hybrid + agentic</text>
    <text x="465" y="329" fill="#16A34A" font-weight="700">0.90</text>
    <text x="655" y="329" fill="#334155">0.88</text>
    <text x="845" y="329" fill="#334155">0.83</text>

    <!-- highlight -->
    <rect x="50" y="344" width="890" height="44" fill="#D1FAE5"/>
    <rect x="50" y="344" width="6" height="44" fill="#059669"/>
    <text x="70" y="372" text-anchor="start" font-weight="700" fill="#065F46">Hybrid + agentic + rerank</text>
    <text x="465" y="372" font-weight="700" fill="#065F46">0.91</text>
    <text x="655" y="372" font-weight="700" fill="#065F46">0.88</text>
    <text x="845" y="372" font-weight="700" fill="#065F46">0.84</text>

    <rect x="50" y="130" width="890" height="258" fill="none" stroke="#94A3B8" stroke-width="1.4"/>
    <line x1="370" y1="130" x2="370" y2="388" stroke="#CBD5E1"/>
    <line x1="560" y1="130" x2="560" y2="388" stroke="#CBD5E1"/>
    <line x1="750" y1="130" x2="750" y2="388" stroke="#CBD5E1"/>
  </g>

  <!-- why not 1.0 -->
  <rect x="50" y="412" width="890" height="120" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.3"/>
  <text x="70" y="437" font-size="14" font-weight="700" fill="#1D4ED8">Why not 1.0?  (your strongest answer is the honest one)</text>
  <text x="70" y="461" font-size="13" fill="#1E3A8A">Faithfulness = fraction of the answer's atomic claims supported by retrieved context. ~0.90 ≈ 1 in 10 claims weakly supported.</text>
  <text x="70" y="483" font-size="13" fill="#1E3A8A">Even a grounded LLM occasionally over-asserts or paraphrases beyond the source — that residual is exactly what the eval surfaces.</text>
  <text x="70" y="509" font-size="13" fill="#1E3A8A">"0.91, not 1.0" + explaining the gap is far stronger in a defense than claiming perfection.</text>
</svg>
